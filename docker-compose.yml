version: '3.8'

services:
  postgres:
    image: postgres:18
    container_name: actions_postgres
    environment:
      POSTGRES_DB: actions_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
